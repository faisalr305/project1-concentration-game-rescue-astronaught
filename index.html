<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rescue the Astronaut</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>

  <h1>🚀 RESCUE THE ASTRONAUT 🚀</h1>

  <div class="game-area">
    <div id="rocket">🚀</div>

    <p id="countdown"></p>
    <p id="target">Target: --</p>

    <div class="oxygen-container">
      <div id="oxygen-bar"></div>
      <span id="oxygen-value">0%</span>
    </div>

    <p id="oxygen-text">Oxygen Level: 0 / 100</p>
    <br>
    <p id="timer">Time: 5</p>
    <br>
    <p id="status">PRESS START</p>
  </div>

  <button id="startbtn">START</button>
  <button id="rescuebtn">RESCUE</button>
  <button id="restartbtn">RESTART</button>

  <script src="./js/app.js"></script>
</body>
</html>
